interfaces:
  - name: e0/0
    description: mgmt_interface
    enabled: true
  - name: e0/1
    description: OSPF_links
    enabled: true
  - name: e0/2
    description: to_r2
    enabled: true
  - name: e0/3
    description: to_r3
    enabled: true
  - name: e1/0
    description: LAN1
    enabled: true


L3_interfaces:
  - name: e0/0
    ipv4:
      - address: 192.168.1.3/24
  - name: e0/1
    ipv4:
      - address: 192.168.0.1/24
  - name: e0/2
    ipv4:
      - address: 192.168.2.1/30
  - name: e0/3
    ipv4:
      - address: 192.168.2.5/30
  - name: e1/0
    ipv4:
      - address: 192.168.3.1/24