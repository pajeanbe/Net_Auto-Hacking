interfaces:
  - name: e0/0
    description: mgmt_interface
    enabled: true
  - name: e0/1
    description: OSPF_links
    enabled: true
  - name: e0/2
    description: to_r2
    enabled: true
  - name: e0/3
    description: to_r3
    enabled: true
  - name: e1/0
    description: LAN1
    enabled: true


L3_interfaces:
  - name: e0/0
    ipv4:
      - address: 192.168.1.3/24
  - name: e0/1
    ipv4:
      - address: 192.168.0.1/24
  - name: e0/2
    ipv4:
      - address: 192.168.2.1/30
  - name: e0/3
    ipv4:
      - address: 192.168.2.5/30
  - name: e1/0
    ipv4:
      - address: 192.168.3.1/24

dhcp:
  pools:
    - name: LAN1
      network: 192.168.3.0
      mask: 255.255.255.0
      default_router: 192.168.3.1
      dns_server:
        - 8.8.8.8
    - name: LAN2
      network: 192.168.4.0
      mask: 255.255.255.0
      default_router: 192.168.4.1
      dns_server:
        - 8.8.8.8
  exclude_address:
    singles:
      - 192.168.3.1
      - 192.168.3.2
      - 192.168.4.1
      - 192.168.4.2
    ranges:
      - start: 192.168.3.3
        end: 192.168.3.9
      - start: 192.168.4.3
        end: 192.168.4.9

ospf:
  processes:
    - process_id: 1
      router_id: 1.1.1.1
      network:
        - address: 192.168.1.0
          wildcard_bits: 0.0.0.255
          area: 0
        - address: 192.168.0.0
          wildcard_bits: 0.0.0.255
          area: 0
        - address: 192.168.2.0
          wildcard_bits: 0.0.0.3
          area: 0
        - address: 192.168.2.4
          wildcard_bits: 0.0.0.3
          area: 0
        - address: 192.168.3.0
          wildcard_bits: 0.0.0.255
          area: 0
      passive_interface:
        interface:
          name:
            - e0/0
            - e1/0
