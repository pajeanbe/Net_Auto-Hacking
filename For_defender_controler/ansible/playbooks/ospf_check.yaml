- name: check ospf
  gather_facts: no
  hosts: routers
  tasks:
    - name: show ip OSPF neighbor
      ios_command:
        commands:
          - show ip OSPF neighbor
      register: output

    - name: print result
      debug:
        msg: "OSPF contains an intruder"
      when: output.stdout[0] | return_router_ids